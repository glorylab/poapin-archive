name: Feature request
description: Propose a focused improvement to the public archive.
title: "feat: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should the project solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the outcome, not only a particular implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: impact
    attributes:
      label: Cost, privacy, and data impact
      description: Consider Worker CPU, D1 reads, R2 operations, caching, provenance, and accessibility.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This proposal does not require the project to redistribute data or media without a documented basis.
          required: true
